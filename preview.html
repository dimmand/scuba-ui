<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCUBA Platform</title>
</head>
<body>
  <h1>SCUBA Platform UI</h1>
  <p>Frontend is live.</p>
  <script>
    fetch("https://ca-api-scuba-dev.blackcoast-ae9d1c0f.swedencentral.azurecontainerapps.io/")
      .then(r => r.json())
      .then(d => {
        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify(d, null, 2);
        document.body.appendChild(pre);
      })
      .catch(err => {
        const pre = document.createElement("pre");
        pre.textContent = "API call failed: " + err;
        document.body.appendChild(pre);
      });
  </script>
</body>
</html>
